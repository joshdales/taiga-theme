details: "{{ type }}er" # Whether the theme is lighter or darker.
background: "{{ ui.0 }}" # Terminal background color
foreground: "{{ text.1 }}" # The foreground color.
accent: "{{ ui.highlight }}" # Accent color for UI elements
terminal_colors: # Ansi escape colors.
  normal:
    black: "{{ terminal.black.2 }}"
    red: "{{ terminal.red.2 }}"
    green: "{{ terminal.green.2 }}"
    yellow: "{{ terminal.yellow.3 }}"
    blue: "{{ terminal.blue.2 }}"
    magenta: "{{ terminal.purple.2 }}"
    cyan: "{{ terminal.teal.2 }}"
    white: "{{ terminal.white.2 }}"
  bright:
    black: "{{ terminal.black.3 }}"
    red: "{{ terminal.red.3 }}"
    green: "{{ terminal.green.3 }}"
    yellow: "{{ terminal.yellow.3 }}"
    blue: "{{ terminal.blue.3 }}"
    magenta: "{{ terminal.purple.3 }}"
    cyan: "{{ terminal.teal.3 }}"
    white: "{{ terminal.white.3 }}"
